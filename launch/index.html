<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Urbanus Fabulae · Launch Command Centre</title>
<style>
:root{--bg:#0d0c0b;--panel:#171512;--panel2:#201d18;--line:#383127;--text:#f5efe3;--muted:#a79d8d;--gold:#d8ad60;--green:#62c18a;--blue:#72a9e5;--amber:#e2a84b;--red:#dc6e65;--shadow:0 22px 60px rgba(0,0,0,.38)}
*{box-sizing:border-box} body{margin:0;min-width:300px;padding:12px;color:var(--text);background:radial-gradient(circle at 85% -10%,rgba(216,173,96,.16),transparent 32%),linear-gradient(180deg,#151310,var(--bg));font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-variant-numeric:tabular-nums}
.shell{width:min(100%,980px);margin:auto;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:var(--panel);box-shadow:var(--shadow)}
.hero{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:24px;background:linear-gradient(100deg,rgba(216,173,96,.08),transparent 52%),repeating-linear-gradient(90deg,transparent 0 43px,rgba(255,255,255,.012) 44px),var(--panel2);border-bottom:1px solid var(--line)}
.kicker{margin:0 0 7px;color:var(--gold);font-size:10px;font-weight:850;letter-spacing:.18em;text-transform:uppercase}h1,h2{font-family:Georgia,serif}h1{margin:0;font-size:clamp(27px,5vw,40px)}.sub{margin:7px 0 0;color:var(--muted);font-size:12px}.updated{margin-top:13px;color:var(--muted);font-size:9px}
.ring{--p:0deg;position:relative;width:116px;height:116px;display:grid;place-items:center;border-radius:50%;background:conic-gradient(var(--gold) var(--p),var(--line) 0)}.ring:before{content:"";position:absolute;inset:8px;border-radius:inherit;background:var(--panel2)}.ring div{position:relative;text-align:center}.ring strong{display:block;font-size:28px}.ring span{color:var(--muted);font-size:8px;letter-spacing:.1em;text-transform:uppercase}
.body{padding:19px 24px 24px}.topline{display:grid;grid-template-columns:minmax(230px,1.5fr) repeat(4,minmax(90px,.7fr));gap:9px}.focus,.stat,.card,.action,.phase,.asset{border:1px solid var(--line);border-radius:12px;background:#131210}.focus{padding:13px 15px;background:linear-gradient(120deg,#49391f,#1c1813);border-color:#5d4826}.label{color:var(--muted);font-size:9px}.focus .label{color:var(--gold);font-weight:800;letter-spacing:.08em;text-transform:uppercase}.focus h3{margin:5px 0 3px;font-size:14px}.focus p{margin:0;color:var(--muted);font-size:9px;line-height:1.4}.stat{padding:12px}.stat strong{display:block;margin-top:7px;font-size:20px}
.section{margin-top:19px;padding-top:17px;border-top:1px solid var(--line)}.heading{display:flex;align-items:end;justify-content:space-between;gap:10px;margin-bottom:10px}h2{margin:0;font-size:17px}.note{color:var(--muted);font-size:9px}
.production{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}.card{padding:12px;background:var(--panel2)}.cardhead{display:flex;justify-content:space-between;gap:8px;font-size:10px}.cardhead strong{color:var(--gold);font-size:13px}.bar{height:6px;margin-top:9px;overflow:hidden;border-radius:9px;background:var(--line)}.fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,#957036,var(--gold))}
.categories{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.category{padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel2)}.categorytop{display:flex;justify-content:space-between;gap:8px;font-size:10px}.categorytop strong{color:var(--gold)}.categorymeta{margin-top:8px;color:var(--muted);font-size:8px}
.workgrid{display:grid;grid-template-columns:1.45fr .8fr;gap:12px}.actions{display:grid;gap:7px}.action{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:10px;align-items:center;padding:10px 11px}.priority{width:8px;height:8px;border-radius:50%;background:var(--blue)}.priority.critical{background:var(--red)}.priority.high{background:var(--amber)}.actionname{font-size:10px;font-weight:750}.actionmeta{margin-top:3px;color:var(--muted);font-size:8px}.pill{padding:3px 6px;border-radius:99px;color:var(--muted);background:#28241e;font-size:8px;white-space:nowrap}.phases{display:grid;gap:7px}.phase{padding:10px 11px}.phasetop{display:flex;justify-content:space-between;font-size:9px}.phasetop strong{color:var(--gold)}
.assets{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.asset{padding:13px;background:var(--panel2)}.assettop{display:flex;justify-content:space-between;gap:10px}.asset h3{margin:0;font-size:12px}.asset strong{font-size:20px;color:var(--gold)}.assetmeta{margin-top:7px;color:var(--muted);font-size:9px}.optional{display:inline-block;margin-left:5px;padding:2px 5px;border-radius:99px;background:rgba(114,169,229,.12);color:var(--blue);font-size:7px;text-transform:uppercase}
.footer{padding:12px 24px 15px;border-top:1px solid var(--line);color:var(--muted);background:#12110f;font-size:9px;line-height:1.5}.error{padding:30px;color:var(--amber);line-height:1.5}
@media(max-width:760px){.topline{grid-template-columns:repeat(2,minmax(0,1fr))}.focus{grid-column:1/-1}.categories{grid-template-columns:repeat(2,minmax(0,1fr))}.workgrid{grid-template-columns:1fr}}
@media(max-width:500px){body{padding:6px}.hero{padding:18px 14px;gap:9px}.ring{width:88px;height:88px}.ring strong{font-size:21px}.body{padding:14px 12px 18px}.production,.categories,.assets{grid-template-columns:1fr 1fr}.footer{padding-left:12px;padding-right:12px}.action{grid-template-columns:8px minmax(0,1fr)}.pill{grid-column:2}}
</style>
</head>
<body><main class="shell" id="dashboard" aria-live="polite"><div class="error">Loading launch command centre…</div></main>
<script>
const ENCRYPTED_DATA_URL="https://raw.githubusercontent.com/Chompet/peter-widgets/main/launch/data.enc.json";
const SAFE_PREVIEW={mode:"preview",updated:"Private data not connected",readiness:0,release:{label:"Set the target date",days:null},focus:{title:"Launch planning",detail:"Add the secure key to unlock live launch status."},counts:{required:0,complete:0,inProgress:0,blocked:0,optional:0},production:{overall:0,mixing:0,mastering:0,artwork:0,tracks:12},categories:[],phases:["Foundation","Pre-launch","Launch week","Post-launch"].map(phase=>({phase,progress:0,total:0,complete:0})),actions:[],assets:{artwork:{total:0,complete:0,active:0,progress:0},video:{total:0,complete:0,active:0,progress:0,optional:true}}};
const esc=value=>String(value??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[c]);
const clamp=value=>Math.max(0,Math.min(100,Number(value)||0));
const progress=(label,value)=>`<div class="card"><div class="cardhead"><span>${esc(label)}</span><strong>${clamp(value)}%</strong></div><div class="bar"><div class="fill" style="width:${clamp(value)}%"></div></div></div>`;
function render(data){const preview=data.mode!=="live",days=data.release?.days;const countdown=days==null?"Date open":days<0?`${Math.abs(days)}d live`:days===0?"Release day":`${days}d to go`;
 const categories=(data.categories||[]).map(c=>`<div class="category"><div class="categorytop"><span>${esc(c.category)}</span><strong>${clamp(c.progress)}%</strong></div><div class="bar"><div class="fill" style="width:${clamp(c.progress)}%"></div></div><div class="categorymeta">${c.complete||0}/${c.required||0} required complete${c.optional?` · ${c.optional} optional`:""}</div></div>`).join("")||'<div class="note">Secure category status appears here.</div>';
 const actions=(data.actions||[]).map(a=>`<div class="action"><span class="priority ${esc(String(a.priority||"").toLowerCase())}"></span><div><div class="actionname">${esc(a.name)}</div><div class="actionmeta">${esc(a.category)} · ${esc(a.status)}${a.due?` · ${esc(a.dueLabel)}`:""}</div></div><span class="pill">${esc(a.priority)}</span></div>`).join("")||'<div class="note">No required gate needs attention.</div>';
 const phases=(data.phases||[]).map(p=>`<div class="phase"><div class="phasetop"><span>${esc(p.phase)}</span><strong>${clamp(p.progress)}%</strong></div><div class="bar"><div class="fill" style="width:${clamp(p.progress)}%"></div></div></div>`).join("");
 document.getElementById("dashboard").innerHTML=`<header class="hero"><div><p class="kicker">Urbanus Fabulae · release operations</p><h1>Launch Command Centre</h1><p class="sub">One view of the required gates, production, campaign and release clock.</p><div class="updated">${preview?"Privacy-safe locked preview":`Updated ${esc(data.updated)}`}</div></div><div class="ring" style="--p:${clamp(data.readiness)*3.6}deg"><div><strong>${clamp(data.readiness)}%</strong><span>launch ready</span></div></div></header>
 <div class="body"><section class="topline"><div class="focus"><div class="label">Command focus</div><h3>${esc(data.focus?.title)}</h3><p>${esc(data.focus?.detail)}</p></div><div class="stat"><div class="label">Release</div><strong>${esc(countdown)}</strong></div><div class="stat"><div class="label">Required done</div><strong>${data.counts?.complete||0}/${data.counts?.required||0}</strong></div><div class="stat"><div class="label">In motion</div><strong>${data.counts?.inProgress||0}</strong></div><div class="stat"><div class="label">Blocked</div><strong>${data.counts?.blocked||0}</strong></div></section>
 <section class="section"><div class="heading"><h2>Album production</h2><span class="note">video is optional and excluded from readiness</span></div><div class="production">${progress("Overall · weighted",data.production?.overall)}${progress("Mixing · 45%",data.production?.mixing)}${progress("Mastering · 35%",data.production?.mastering)}${progress("Per-song art · 20%",data.production?.artwork)}</div></section>
 <section class="section"><div class="heading"><h2>Launch systems</h2><span class="note">required gates are weight-normalised; optional ideas never lower readiness</span></div><div class="categories">${categories}</div></section>
 <section class="section"><div class="heading"><h2>Next required gates</h2><span class="note">priority, live status and due date</span></div><div class="workgrid"><div class="actions">${actions}</div><div class="phases">${phases}</div></div></section>
 <section class="section"><div class="heading"><h2>Creative asset engine</h2><span class="note">visibility without turning every idea into a blocker</span></div><div class="assets"><div class="asset"><div class="assettop"><h3>Artwork & design</h3><strong>${clamp(data.assets?.artwork?.progress)}%</strong></div><div class="assetmeta">${data.assets?.artwork?.complete||0} complete · ${data.assets?.artwork?.active||0} active · ${data.assets?.artwork?.total||0} total</div></div><div class="asset"><div class="assettop"><h3>Video & teasers <span class="optional">optional assets</span></h3><strong>${clamp(data.assets?.video?.progress)}%</strong></div><div class="assetmeta">${data.assets?.video?.complete||0} complete · ${data.assets?.video?.active||0} active · ${data.assets?.video?.total||0} total</div></div></div></section></div>
 <footer class="footer">${preview?"No private launch data is present in this preview. ":"Only production aggregates and launch-gate status are displayed. "}Notes, definitions, working and file links, private paths, backups, song content and contact details are excluded. The decryption key stays in the URL fragment and is never stored in browser storage.</footer>`}
function bytes(value){const b=String(value).replace(/-/g,"+").replace(/_/g,"/");return Uint8Array.from(atob(b.padEnd(Math.ceil(b.length/4)*4,"=")),c=>c.charCodeAt(0))}
function keyFromHash(){return new URLSearchParams(location.hash.slice(1)).get("key")}
async function decrypt(payload,encoded){if(payload?.v!==1||payload?.alg!=="A256GCM")throw new Error("Unsupported encrypted data");const raw=bytes(encoded);if(raw.byteLength!==32)throw new Error("Invalid key");const key=await crypto.subtle.importKey("raw",raw,"AES-GCM",false,["decrypt"]);const clear=await crypto.subtle.decrypt({name:"AES-GCM",iv:bytes(payload.iv),tagLength:128},key,bytes(payload.ciphertext));return JSON.parse(new TextDecoder().decode(clear))}
async function load(){const key=keyFromHash();if(!key)return SAFE_PREVIEW;const response=await fetch(`${ENCRYPTED_DATA_URL}?t=${Date.now()}`,{cache:"no-store"});if(!response.ok)throw new Error("Encrypted launch data not ready");return decrypt(await response.json(),key)}
load().then(render).catch(()=>{document.getElementById("dashboard").innerHTML='<div class="error">The secure launch command centre could not be unlocked. Run the launch sync once, then confirm that the embed key matches LAUNCH_DASHBOARD_KEY.</div>'});
</script></body></html>
