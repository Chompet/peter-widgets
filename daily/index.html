<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light"><title>Daily Mission Control</title>
<style>
:root{--bg:#eef1f6;--panel:#fff;--soft:#f6f7fa;--ink:#172033;--muted:#697386;--line:#dfe3ea;--navy:#182842;--blue:#426fc5;--teal:#208a7b;--amber:#c47a1d;--red:#bd4b45;--purple:#7359b5;--shadow:0 18px 48px rgba(24,40,66,.12)}*{box-sizing:border-box}body{margin:0;min-width:300px;padding:12px;color:var(--ink);background:radial-gradient(circle at 88% -8%,rgba(66,111,197,.16),transparent 30%),linear-gradient(180deg,#f7f8fb,var(--bg));font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-variant-numeric:tabular-nums}.dashboard{width:min(100%,980px);margin:auto;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:var(--panel);box-shadow:var(--shadow)}.hero{padding:23px 24px 19px;color:#fff;background:linear-gradient(120deg,rgba(66,111,197,.34),transparent 55%),linear-gradient(135deg,#1b304f,#15243d)}.hero-top{display:flex;justify-content:space-between;gap:18px;align-items:start}.kicker{margin:0 0 6px;color:#8fb5ff;font-size:10px;font-weight:850;letter-spacing:.16em;text-transform:uppercase}h1{margin:0;font-size:clamp(28px,5vw,40px);letter-spacing:-.035em}.date{margin:6px 0 0;color:#cbd5e6;font-size:12px}.updated{padding:7px 10px;border:1px solid rgba(255,255,255,.18);border-radius:99px;color:#dbe4f2;background:rgba(255,255,255,.07);font-size:9px}.focus{display:grid;grid-template-columns:30px minmax(0,1fr) auto;gap:10px;align-items:center;margin-top:16px;padding:12px 13px;border:1px solid rgba(143,181,255,.24);border-radius:13px;background:rgba(143,181,255,.12)}.focus-icon{width:26px;height:26px;display:grid;place-items:center;border-radius:50%;color:#18345d;background:#9abaff;font-weight:900}.focus strong{display:block;font-size:13px}.focus span{display:block;margin-top:3px;color:#ccd8ec;font-size:9px;line-height:1.4}.workload{color:#9abaff;font-size:13px;font-weight:850;white-space:nowrap}.body{padding:18px 22px 24px}.stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}.stat{padding:11px;border:1px solid var(--line);border-radius:12px;background:var(--soft)}.stat-label{color:var(--muted);font-size:8px;font-weight:750;letter-spacing:.04em;text-transform:uppercase}.stat-value{margin-top:6px;font-size:22px;font-weight:850}.alert .stat-value{color:var(--red)}.section{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:10px}h2{margin:0;font-size:15px}.note{color:var(--muted);font-size:8px;text-align:right}.two{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(260px,.8fr);gap:12px}.card{overflow:hidden;border:1px solid var(--line);border-radius:14px;background:var(--soft)}.card-title{padding:10px 12px;border-bottom:1px solid var(--line);color:var(--muted);background:#f1f3f7;font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}.task{display:grid;grid-template-columns:24px minmax(130px,1fr) 65px 74px;gap:8px;align-items:center;min-height:49px;padding:8px 10px;border-top:1px solid var(--line)}.task:first-of-type{border-top:0}.rank{width:22px;height:22px;display:grid;place-items:center;border-radius:7px;color:var(--blue);background:#e4ecfb;font-size:9px;font-weight:850}.task-name{overflow:hidden;font-size:10px;font-weight:780;text-overflow:ellipsis;white-space:nowrap}.task-meta{margin-top:3px;color:var(--muted);font-size:8px}.badge{padding:4px 6px;border-radius:7px;color:#315996;background:#e4ecfb;font-size:8px;font-weight:750;text-align:center}.badge.overdue{color:#923530;background:#f9e6e4}.due{color:var(--muted);font-size:8px;text-align:right}.schedule{padding:4px 11px}.event{display:grid;grid-template-columns:46px minmax(0,1fr);gap:9px;padding:9px 0;border-top:1px solid var(--line)}.event:first-child{border-top:0}.time{color:var(--blue);font-size:9px;font-weight:850}.event-name{font-size:9px;font-weight:760}.event-meta{margin-top:3px;color:var(--muted);font-size:7px}.empty{padding:16px;color:var(--muted);font-size:10px}.energy{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}.lane{padding:12px;border:1px solid var(--line);border-radius:13px;background:var(--soft)}.lane-head{display:flex;justify-content:space-between;gap:8px;font-size:10px;font-weight:800}.lane-head strong{color:var(--blue)}.lane-item{margin-top:8px;overflow:hidden;color:var(--muted);font-size:8px;text-overflow:ellipsis;white-space:nowrap}.pulse{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}.pulse-box{padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--soft)}.pulse-box strong{display:block;font-size:20px}.pulse-box span{display:block;margin-top:4px;color:var(--muted);font-size:8px}.work-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.session,.area{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:9px 11px;border-top:1px solid var(--line);font-size:9px}.session:first-of-type,.area:first-of-type{border-top:0}.session-name{font-weight:760}.session-meta{margin-top:3px;color:var(--muted);font-size:7px}.minutes{color:var(--teal);font-weight:850}.upcoming{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:10px}.upcoming-item{padding:9px;border-radius:10px;background:#fff}.upcoming-item strong{display:block;font-size:9px}.upcoming-item span{display:block;margin-top:4px;color:var(--muted);font-size:7px}.quality{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;padding:11px}.quality div{padding:10px;border-radius:9px;background:#fff}.quality strong{display:block;color:var(--amber);font-size:16px}.quality span{display:block;margin-top:4px;color:var(--muted);font-size:7px}.footer{padding:11px 22px 14px;border-top:1px solid var(--line);color:var(--muted);background:#f6f7f9;font-size:8px;line-height:1.55}.error{padding:30px;color:var(--amber);font-size:12px;line-height:1.5}@media(max-width:800px){.stats{grid-template-columns:repeat(3,minmax(0,1fr))}.two,.work-grid{grid-template-columns:1fr}.energy{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:540px){body{padding:5px}.hero{padding:18px 14px 15px}.hero-top{display:block}.updated{display:inline-block;margin-top:10px}.focus{grid-template-columns:28px minmax(0,1fr)}.workload{grid-column:2}.body{padding:14px 11px 18px}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.task{grid-template-columns:22px minmax(110px,1fr) 65px}.due{display:none}.pulse{grid-template-columns:repeat(2,minmax(0,1fr))}.upcoming{grid-template-columns:1fr}.quality{grid-template-columns:repeat(2,minmax(0,1fr))}.footer{padding-left:11px;padding-right:11px}}
</style></head><body><main class="dashboard" id="dashboard" aria-live="polite"><div class="error">Loading Daily Mission Control…</div></main>
<script>
const ENCRYPTED_DATA_URL="https://raw.githubusercontent.com/Chompet/peter-widgets/main/daily/data.enc.json";
const SAFE_PREVIEW={mode:"preview",dateLabel:"Today",updated:"Locked preview",focus:{title:"Choose the mission",detail:"Add the private URL-fragment key to unlock your daily command picture."},counts:{active:0,overdue:0,dueToday:0,inProgress:0,missions:0,nextActions:0,completedToday:0},workload:{label:"0m"},queue:[],energy:["Deep Focus","Normal","Easy","Not set"].map(label=>({label,count:0,tasks:[]})),schedule:{today:[],upcoming:[]},work:{label:"0m",sessions:0,goals:0,running:0,areas:[],recent:[]},quality:{missingDue:0,missingEstimate:0,missingEnergy:0,unselected:0}};
const esc=value=>String(value??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[c]);
const rows=(items,fn,message)=>items?.length?items.map(fn).join(""):`<div class="empty">${esc(message)}</div>`;
function render(data){const preview=data.mode!=="live";
 const tasks=rows(data.queue,(item,i)=>`<div class="task"><span class="rank">${i+1}</span><div><div class="task-name">${esc(item.name)}</div><div class="task-meta">${esc(item.area)} · ${esc(item.estimate)}${item.mission?" · Mission":item.nextAction?" · Next action":""}</div></div><span class="badge ${item.overdue?"overdue":""}">${esc(item.priority)}</span><span class="due">${esc(item.dueLabel)}</span></div>`,"No active tasks are competing for attention.");
 const today=rows(data.schedule?.today,item=>`<div class="event"><span class="time">${esc(item.time)}</span><div><div class="event-name">${esc(item.name)}</div><div class="event-meta">${esc(item.type)} · ${esc(item.area)}${item.confirmed?" · Confirmed":""}</div></div></div>`,"Nothing scheduled today.");
 const energy=(data.energy||[]).map(lane=>`<div class="lane"><div class="lane-head"><span>${esc(lane.label)}</span><strong>${lane.count}</strong></div>${(lane.tasks||[]).map(task=>`<div class="lane-item">${esc(task)}</div>`).join("")||'<div class="lane-item">No active tasks</div>'}</div>`).join("");
 const sessions=rows(data.work?.recent,item=>`<div class="session"><div><div class="session-name">${esc(item.name)}</div><div class="session-meta">${esc(item.started)} · ${esc(item.area)}${item.goal?" · Goal achieved":""}${item.running?" · Running":""}</div></div><span class="minutes">${item.minutes}m</span></div>`,"No work session logged today.");
 const areas=rows(data.work?.areas,item=>`<div class="area"><span>${esc(item.area)}</span><span class="minutes">${item.minutes}m</span></div>`,"No area totals yet.");
 const upcoming=rows(data.schedule?.upcoming,item=>`<div class="upcoming-item"><strong>${esc(item.name)}</strong><span>${esc(item.day)} · ${esc(item.time)} · ${esc(item.type)}${item.confirmed?" · Confirmed":""}</span></div>`,"No events in the next seven days.");
 document.getElementById("dashboard").innerHTML=`<header class="hero"><div class="hero-top"><div><p class="kicker">Peter OS · daily operations</p><h1>Daily Mission Control</h1><p class="date">${esc(data.dateLabel)}</p></div><div class="updated">${preview?"Privacy-safe preview":`Updated ${esc(data.updated)}`}</div></div><div class="focus"><span class="focus-icon">→</span><div><strong>${esc(data.focus?.title)}</strong><span>${esc(data.focus?.detail)}</span></div><div class="workload">${esc(data.workload?.label)} selected load</div></div></header>
 <div class="body"><section class="stats"><div class="stat"><div class="stat-label">Active</div><div class="stat-value">${data.counts?.active||0}</div></div><div class="stat alert"><div class="stat-label">Overdue</div><div class="stat-value">${data.counts?.overdue||0}</div></div><div class="stat"><div class="stat-label">Due today</div><div class="stat-value">${data.counts?.dueToday||0}</div></div><div class="stat"><div class="stat-label">In progress</div><div class="stat-value">${data.counts?.inProgress||0}</div></div><div class="stat"><div class="stat-label">Missions</div><div class="stat-value">${data.counts?.missions||0}</div></div><div class="stat"><div class="stat-label">Done today</div><div class="stat-value">${data.counts?.completedToday||0}</div></div></section>
 <section class="section"><div class="head"><h2>What to do next</h2><span class="note">mission, next-action, status, priority and date weighted</span></div><div class="two"><div class="card"><div class="card-title">Priority stack</div>${tasks}</div><div class="card"><div class="card-title">Today’s schedule</div><div class="schedule">${today}</div></div></div></section>
 <section class="section"><div class="head"><h2>Match the task to your energy</h2><span class="note">top active work in each cognitive lane</span></div><div class="energy">${energy}</div></section>
 <section class="section"><div class="head"><h2>Today’s work pulse</h2><span class="note">from Work Log sessions, not estimates</span></div><div class="pulse"><div class="pulse-box"><strong>${esc(data.work?.label)}</strong><span>logged work</span></div><div class="pulse-box"><strong>${data.work?.sessions||0}</strong><span>sessions</span></div><div class="pulse-box"><strong>${data.work?.goals||0}</strong><span>goals achieved</span></div><div class="pulse-box"><strong>${data.work?.running||0}</strong><span>running now</span></div></div><div class="work-grid"><div class="card"><div class="card-title">Recent sessions</div>${sessions}</div><div class="card"><div class="card-title">Time by area</div>${areas}</div></div></section>
 <section class="section"><div class="head"><h2>Next seven days</h2><span class="note">confirmed and provisional Events</span></div><div class="card"><div class="upcoming">${upcoming}</div></div></section>
 <section class="section"><div class="head"><h2>Tracker hygiene</h2><span class="note">small fixes that improve the next recommendation</span></div><div class="card"><div class="quality"><div><strong>${data.quality?.missingDue||0}</strong><span>missing due date</span></div><div><strong>${data.quality?.missingEstimate||0}</strong><span>missing estimate</span></div><div><strong>${data.quality?.missingEnergy||0}</strong><span>missing energy</span></div><div><strong>${data.quality?.unselected||0}</strong><span>not Mission/Next Action</span></div></div></div></section></div>
 <footer class="footer">${preview?"No private operational data is present in this preview. ":"Encrypted daily operational summary. "}Task, event and work-session titles are included for usefulness. Notes, project and song relations, locations, work summaries, problems, next-session notes, Notion URLs and private page content are excluded. The key remains in the URL fragment and is never stored in browser storage.</footer>`}
function bytes(value){const b=String(value).replace(/-/g,"+").replace(/_/g,"/");return Uint8Array.from(atob(b.padEnd(Math.ceil(b.length/4)*4,"=")),c=>c.charCodeAt(0))}function keyFromHash(){return new URLSearchParams(location.hash.slice(1)).get("key")}async function decrypt(payload,encoded){if(payload?.v!==1||payload?.alg!=="A256GCM")throw new Error("Unsupported encrypted data");const raw=bytes(encoded);if(raw.byteLength!==32)throw new Error("Invalid key");const key=await crypto.subtle.importKey("raw",raw,"AES-GCM",false,["decrypt"]);const clear=await crypto.subtle.decrypt({name:"AES-GCM",iv:bytes(payload.iv),tagLength:128},key,bytes(payload.ciphertext));return JSON.parse(new TextDecoder().decode(clear))}async function load(){const key=keyFromHash();if(!key)return SAFE_PREVIEW;const response=await fetch(`${ENCRYPTED_DATA_URL}?t=${Date.now()}`,{cache:"no-store"});if(!response.ok)throw new Error("Encrypted daily data not ready");return decrypt(await response.json(),key)}load().then(render).catch(()=>{document.getElementById("dashboard").innerHTML='<div class="error">The secure Daily Mission Control could not be unlocked. Run the daily sync once, then confirm that the embed key matches DAILY_DASHBOARD_KEY.</div>'});
</script></body></html>
