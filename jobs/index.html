<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Job Search · Command Centre</title>
<style>
:root {
  --page: #eef2f4;
  --panel: #ffffff;
  --panel-2: #f7f9fa;
  --ink: #13242d;
  --muted: #64747c;
  --line: #dce5e8;
  --navy: #173d50;
  --teal: #168270;
  --teal-soft: #dff3ee;
  --blue: #3979c4;
  --blue-soft: #e6effb;
  --amber: #c97920;
  --amber-soft: #fff0dc;
  --red: #bd4b45;
  --red-soft: #fbe8e6;
  --purple: #7654b4;
  --shadow: 0 18px 48px rgba(27,55,68,.11);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-width: 300px;
  padding: 12px;
  color: var(--ink);
  background:
    radial-gradient(circle at 85% -10%, rgba(22,130,112,.12), transparent 31%),
    linear-gradient(180deg, #f4f7f8, var(--page));
  font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-variant-numeric: tabular-nums;
}
.dashboard {
  width: min(100%, 980px);
  margin: 0 auto;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: var(--panel);
  box-shadow: var(--shadow);
}
.hero {
  padding: 22px 24px 18px;
  color: white;
  background:
    linear-gradient(110deg, rgba(22,130,112,.3), transparent 58%),
    linear-gradient(135deg, #163b4d, #102f40);
}
.hero-top { display: flex; justify-content: space-between; gap: 18px; align-items: start; }
.kicker { margin: 0 0 6px; color: #7ee1cc; font-size: 10px; font-weight: 850; letter-spacing: .16em; text-transform: uppercase; }
h1 { margin: 0; font-size: clamp(27px, 5vw, 40px); letter-spacing: -.035em; }
.subtitle { margin: 6px 0 0; color: #c4d4dc; font-size: 12px; line-height: 1.45; }
.updated { flex: 0 0 auto; margin-top: 3px; padding: 7px 10px; border: 1px solid rgba(255,255,255,.18); border-radius: 999px; color: #d3e4e9; background: rgba(255,255,255,.07); font-size: 9px; }
.focus { display: flex; gap: 10px; align-items: center; margin-top: 16px; padding: 11px 13px; border-radius: 12px; color: #e9fffa; background: rgba(126,225,204,.12); border: 1px solid rgba(126,225,204,.2); }
.focus-icon { width: 23px; height: 23px; display: grid; flex: 0 0 auto; place-items: center; border-radius: 50%; color: #0b3b32; background: #7ee1cc; font-size: 12px; font-weight: 900; }
.focus strong { display: block; font-size: 12px; }
.focus span { display: block; margin-top: 2px; color: #c4ddd7; font-size: 9px; line-height: 1.4; }
.content { padding: 18px 22px 24px; }
.stats { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 8px; }
.stat { min-width: 0; padding: 11px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-2); }
.stat-label { color: var(--muted); font-size: 8px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.stat-value { margin-top: 6px; font-size: 22px; font-weight: 850; line-height: 1; }
.stat-alert .stat-value { color: var(--red); }
.section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
.section-head { display: flex; justify-content: space-between; gap: 12px; align-items: end; margin-bottom: 10px; }
h2 { margin: 0; font-size: 15px; letter-spacing: -.015em; }
.note { color: var(--muted); font-size: 8px; text-align: right; }
.two-col { display: grid; grid-template-columns: minmax(0,1.55fr) minmax(250px,.85fr); gap: 12px; }
.card { overflow: hidden; border: 1px solid var(--line); border-radius: 14px; background: var(--panel-2); }
.card-title { padding: 10px 12px; border-bottom: 1px solid var(--line); color: var(--muted); background: #f2f6f7; font-size: 9px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase; }
.priority-row { display: grid; grid-template-columns: 25px minmax(140px,1fr) 68px 62px 88px; gap: 7px; align-items: center; min-height: 48px; padding: 7px 10px; border-top: 1px solid var(--line); }
.priority-row:first-of-type { border-top: 0; }
.rank { width: 22px; height: 22px; display: grid; place-items: center; border-radius: 7px; color: var(--teal); background: var(--teal-soft); font-size: 9px; font-weight: 850; }
.job { min-width: 0; }
.job-role { overflow: hidden; font-size: 10px; font-weight: 780; text-overflow: ellipsis; white-space: nowrap; }
.job-company { overflow: hidden; margin-top: 3px; color: var(--muted); font-size: 8px; text-overflow: ellipsis; white-space: nowrap; }
.fit { font-size: 10px; font-weight: 850; }
.fit span { color: var(--muted); font-size: 7px; font-weight: 600; }
.date { color: var(--muted); font-size: 8px; }
.date.overdue { color: var(--red); font-weight: 800; }
.action { padding: 5px 7px; border-radius: 7px; color: #116153; background: var(--teal-soft); font-size: 8px; font-weight: 750; text-align: center; }
.action.overdue { color: #8e312d; background: var(--red-soft); }
.empty { padding: 16px; color: var(--muted); font-size: 10px; }
.pipeline { padding: 12px; }
.pipe-row { margin-bottom: 11px; }
.pipe-row:last-child { margin-bottom: 0; }
.pipe-copy { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 5px; font-size: 9px; }
.pipe-copy strong { font-size: 10px; }
.track { height: 7px; overflow: hidden; border-radius: 99px; background: #e1e8ea; }
.fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--teal), #52b49f); }
.chart { height: 135px; display: grid; grid-template-columns: repeat(8,minmax(0,1fr)); gap: 7px; align-items: end; padding: 16px 12px 10px; }
.bar-wrap { height: 100%; display: flex; flex-direction: column; justify-content: end; align-items: center; gap: 5px; }
.bar-value { min-height: 10px; color: var(--navy); font-size: 8px; font-weight: 800; }
.bar { width: min(28px,75%); min-height: 3px; border-radius: 6px 6px 2px 2px; background: linear-gradient(180deg, #56b79f, var(--teal)); }
.bar-label { color: var(--muted); font-size: 7px; white-space: nowrap; }
.area-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
.area-card { padding: 13px; border: 1px solid var(--line); border-radius: 13px; background: var(--panel-2); }
.area-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
.area-name { font-size: 12px; font-weight: 800; }
.area-fit { color: var(--teal); font-size: 11px; font-weight: 850; }
.area-fit span { color: var(--muted); font-size: 7px; font-weight: 600; }
.area-stats { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 4px; margin-top: 12px; }
.mini { padding: 7px 5px; border-radius: 8px; background: white; text-align: center; }
.mini strong { display: block; font-size: 13px; }
.mini span { display: block; margin-top: 3px; color: var(--muted); font-size: 7px; }
.triple { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; }
.compact-list { padding: 5px 11px; }
.list-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: center; padding: 8px 0; border-top: 1px solid var(--line); }
.list-row:first-child { border-top: 0; }
.list-title { min-width: 0; overflow: hidden; font-size: 9px; font-weight: 740; text-overflow: ellipsis; white-space: nowrap; }
.list-sub { margin-top: 2px; color: var(--muted); font-size: 7px; }
.score { min-width: 30px; color: var(--teal); font-size: 11px; font-weight: 850; text-align: right; }
.salary { padding: 17px 12px; text-align: center; }
.salary-value { font-size: 24px; font-weight: 850; letter-spacing: -.03em; }
.salary-label { margin-top: 5px; color: var(--muted); font-size: 8px; }
.salary-coverage { margin-top: 11px; color: var(--amber); font-size: 9px; font-weight: 750; }
.cv-row { display: grid; grid-template-columns: minmax(0,1fr) 36px 48px; gap: 7px; align-items: center; padding: 9px 11px; border-top: 1px solid var(--line); font-size: 8px; }
.cv-row:first-of-type { border-top: 0; }
.cv-name { overflow: hidden; font-weight: 750; text-overflow: ellipsis; white-space: nowrap; }
.cv-num { color: var(--muted); text-align: right; }
.cv-rate { color: var(--purple); font-weight: 850; text-align: right; }
.quality { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 7px; padding: 11px; }
.quality-item { padding: 9px; border-radius: 9px; background: white; }
.quality-value { color: var(--amber); font-size: 15px; font-weight: 850; }
.quality-label { margin-top: 4px; color: var(--muted); font-size: 7px; }
.footer { padding: 11px 22px 14px; border-top: 1px solid var(--line); color: var(--muted); background: #f6f8f9; font-size: 8px; line-height: 1.5; }
.error { padding: 30px; color: var(--amber); font-size: 12px; line-height: 1.5; }
@media (max-width: 800px) {
  .stats { grid-template-columns: repeat(3,minmax(0,1fr)); }
  .two-col, .triple { grid-template-columns: 1fr; }
  .area-grid { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  body { padding: 5px; }
  .hero { padding: 18px 14px 15px; }
  .hero-top { display: block; }
  .updated { display: inline-block; margin-top: 10px; }
  .content { padding: 14px 11px 18px; }
  .stats { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .priority-row { grid-template-columns: 24px minmax(120px,1fr) 46px 75px; }
  .priority-row .date { display: none; }
  .chart { gap: 3px; padding-left: 6px; padding-right: 6px; }
  .quality { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .footer { padding-left: 11px; padding-right: 11px; }
}
</style>
</head>
<body>
<main class="dashboard" id="dashboard" aria-live="polite"><div class="error">Loading job-search command centre…</div></main>
<script>
const ENCRYPTED_DATA_URL = "https://raw.githubusercontent.com/Chompet/peter-widgets/main/jobs/data.enc.json";
const SAFE_PREVIEW = {
  mode: "preview", updated: "Locked preview",
  focus: { title: "Secure dashboard ready", detail: "Add the private URL-fragment key to unlock encrypted job-search data." },
  counts: { tracked: 0, active: 0, applied7d: 0, interviews: 0, offers: 0, overdue: 0, potential: 0 },
  pipeline: ["Ready to apply", "Applied", "Recruiter response", "Interview / test", "Offer"].map((label, index) => ({ key: String(index), label, count: 0 })),
  weekly: ["Week 1", "Week 2", "Week 3", "Week 4", "Week 5", "Week 6", "Week 7", "This week"].map(label => ({ label, count: 0 })),
  areas: [], cvPerformance: [], salary: { median: null, known: 0, active: 0 },
  priority: [], highChance: [], upcoming: [], potential: [],
  missing: { fitScore: 0, nextAction: 0, salary: 0, location: 0 }
};
function esc(value) { return String(value ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[c]); }
function money(value) { return Number.isFinite(Number(value)) ? new Intl.NumberFormat("en-GB", { style:"currency", currency:"GBP", maximumFractionDigits:0 }).format(value) : "—"; }
function rowsOrEmpty(rows, renderer, message) { return rows?.length ? rows.map(renderer).join("") : `<div class="empty">${esc(message)}</div>`; }
function render(data) {
  const preview = data.mode !== "live";
  const maxPipeline = Math.max(1, ...(data.pipeline || []).map(item => item.count));
  const maxWeekly = Math.max(1, ...(data.weekly || []).map(item => item.count));
  const priority = rowsOrEmpty(data.priority, (item, index) => `<div class="priority-row">
    <span class="rank">${index + 1}</span><div class="job"><div class="job-role">${esc(item.role)}</div><div class="job-company">${esc(item.company)} · ${esc(item.area)}</div></div>
    <div class="fit">${item.fitScore ?? "—"}<span>/100</span></div><div class="date ${item.overdue ? "overdue" : ""}">${esc(item.nextAction)}</div>
    <div class="action ${item.overdue ? "overdue" : ""}">${esc(item.action)}</div></div>`, "No priority actions right now.");
  const pipeline = (data.pipeline || []).map(item => `<div class="pipe-row"><div class="pipe-copy"><span>${esc(item.label)}</span><strong>${item.count}</strong></div><div class="track"><div class="fill" style="width:${Math.round(item.count / maxPipeline * 100)}%"></div></div></div>`).join("");
  const weekly = (data.weekly || []).map(item => `<div class="bar-wrap"><span class="bar-value">${item.count || ""}</span><span class="bar" style="height:${Math.max(3, Math.round(item.count / maxWeekly * 94))}px"></span><span class="bar-label">${esc(item.label)}</span></div>`).join("");
  const areas = (data.areas || []).slice(0, 4).map(item => `<div class="area-card"><div class="area-head"><span class="area-name">${esc(item.area)}</span><span class="area-fit">${item.averageFit ?? "—"}<span>/100 avg fit</span></span></div><div class="area-stats"><div class="mini"><strong>${item.total}</strong><span>tracked</span></div><div class="mini"><strong>${item.active}</strong><span>active</span></div><div class="mini"><strong>${item.interviews}</strong><span>interview</span></div><div class="mini"><strong>${item.offers}</strong><span>offer</span></div></div></div>`).join("");
  const chances = rowsOrEmpty(data.highChance, item => `<div class="list-row"><div><div class="list-title">${esc(item.role)}</div><div class="list-sub">${esc(item.company)} · ${esc(item.status)}</div></div><span class="score">${item.fitScore}</span></div>`, "No 80+ Fit Score roles yet.");
  const upcoming = rowsOrEmpty(data.upcoming, item => `<div class="list-row"><div><div class="list-title">${esc(item.role)}</div><div class="list-sub">${esc(item.company)} · ${esc(item.status)}</div></div><span class="score">${esc(item.nextAction)}</span></div>`, "No upcoming dated actions.");
  const potential = rowsOrEmpty(data.potential, item => `<div class="list-row"><div><div class="list-title">${esc(item.name)}</div><div class="list-sub">${esc(item.source)} · ${esc(item.status)}</div></div><span class="score">${item.received ? esc(new Date(item.received).toLocaleDateString("en-GB", {day:"numeric",month:"short"})) : "—"}</span></div>`, "Potential Jobs inbox is clear.");
  const cvs = rowsOrEmpty(data.cvPerformance, item => { const rate = item.applications ? Math.round(item.progressed / item.applications * 100) : 0; return `<div class="cv-row"><span class="cv-name">${esc(item.cv)}</span><span class="cv-num">${item.applications} sent</span><span class="cv-rate">${rate}% prog.</span></div>`; }, "No CV usage data yet.");
  document.getElementById("dashboard").innerHTML = `<header class="hero"><div class="hero-top"><div><p class="kicker">Career control · application intelligence</p><h1>Job Search Command Centre</h1><p class="subtitle">Turn the application list into a focused daily decision system.</p></div><div class="updated">${preview ? "Privacy-safe preview" : `Updated ${esc(data.updated)}`}</div></div><div class="focus"><span class="focus-icon">→</span><div><strong>${esc(data.focus?.title)}</strong><span>${esc(data.focus?.detail)}</span></div></div></header>
  <div class="content"><section class="stats">
    <div class="stat"><div class="stat-label">Active</div><div class="stat-value">${data.counts?.active || 0}</div></div>
    <div class="stat"><div class="stat-label">Applied · 7 days</div><div class="stat-value">${data.counts?.applied7d || 0}</div></div>
    <div class="stat"><div class="stat-label">Interviews</div><div class="stat-value">${data.counts?.interviews || 0}</div></div>
    <div class="stat"><div class="stat-label">Offers</div><div class="stat-value">${data.counts?.offers || 0}</div></div>
    <div class="stat stat-alert"><div class="stat-label">Overdue</div><div class="stat-value">${data.counts?.overdue || 0}</div></div>
    <div class="stat"><div class="stat-label">Potential inbox</div><div class="stat-value">${data.counts?.potential || 0}</div></div>
  </section>
  <section class="section"><div class="section-head"><h2>What to do next</h2><span class="note">ranked by stage, Fit Score and action date</span></div><div class="two-col"><div class="card"><div class="card-title">Priority queue</div>${priority}</div><div class="card"><div class="card-title">Current pipeline</div><div class="pipeline">${pipeline}</div></div></div></section>
  <section class="section"><div class="section-head"><h2>Application momentum</h2><span class="note">applications submitted by week</span></div><div class="card"><div class="chart">${weekly}</div></div></section>
  <section class="section"><div class="section-head"><h2>Role-market comparison</h2><span class="note">where effort is producing live opportunities</span></div><div class="area-grid">${areas}</div></section>
  <section class="section"><div class="section-head"><h2>Opportunity intelligence</h2><span class="note">strong matches, dates and incoming possibilities</span></div><div class="triple"><div class="card"><div class="card-title">High-chance roles · 80+</div><div class="compact-list">${chances}</div></div><div class="card"><div class="card-title">Upcoming actions</div><div class="compact-list">${upcoming}</div></div><div class="card"><div class="card-title">Potential Jobs inbox</div><div class="compact-list">${potential}</div></div></div></section>
  <section class="section"><div class="section-head"><h2>Search quality</h2><span class="note">salary signal, CV mix and missing tracker fields</span></div><div class="triple"><div class="card"><div class="card-title">Known salary signal</div><div class="salary"><div class="salary-value">${money(data.salary?.median)}</div><div class="salary-label">median annualised salary</div><div class="salary-coverage">${data.salary?.known || 0} of ${data.salary?.active || 0} active roles have salary data</div></div></div><div class="card"><div class="card-title">CV performance proxy</div>${cvs}</div><div class="card"><div class="card-title">Missing fields · active roles</div><div class="quality"><div class="quality-item"><div class="quality-value">${data.missing?.fitScore || 0}</div><div class="quality-label">Fit Score</div></div><div class="quality-item"><div class="quality-value">${data.missing?.nextAction || 0}</div><div class="quality-label">Next action</div></div><div class="quality-item"><div class="quality-value">${data.missing?.salary || 0}</div><div class="quality-label">Salary</div></div><div class="quality-item"><div class="quality-value">${data.missing?.location || 0}</div><div class="quality-label">Location</div></div></div></div></div></section></div>
  <footer class="footer">${preview ? "Preview data only. " : "Encrypted live aggregate. "}Notes, Fit Rationale, recruiter/contact relations, email links, job links, Notion URLs, exact addresses and email subjects are excluded. Salary values below £100 are treated as hourly and values below £10,000 as monthly for the annualised signal.</footer>`;
}
function base64urlBytes(value) { const base64 = String(value).replace(/-/g,"+").replace(/_/g,"/"); const padded = base64.padEnd(Math.ceil(base64.length / 4) * 4,"="); return Uint8Array.from(atob(padded), c => c.charCodeAt(0)); }
function dashboardKey() { return new URLSearchParams(location.hash.slice(1)).get("key"); }
async function decrypt(payload, encodedKey) {
  if (payload?.v !== 1 || payload?.alg !== "A256GCM") throw new Error("Unsupported encrypted data format");
  const raw = base64urlBytes(encodedKey); if (raw.byteLength !== 32) throw new Error("Invalid dashboard key");
  const key = await crypto.subtle.importKey("raw", raw, "AES-GCM", false, ["decrypt"]);
  const clear = await crypto.subtle.decrypt({ name:"AES-GCM", iv:base64urlBytes(payload.iv), tagLength:128 }, key, base64urlBytes(payload.ciphertext));
  return JSON.parse(new TextDecoder().decode(clear));
}
async function load() {
  const key = dashboardKey();
  if (!key) return SAFE_PREVIEW;
  const response = await fetch(`${ENCRYPTED_DATA_URL}?t=${Date.now()}`, { cache:"no-store" });
  if (!response.ok) throw new Error("Encrypted dashboard not ready");
  return decrypt(await response.json(), key);
}
load().then(render).catch(() => { document.getElementById("dashboard").innerHTML = `<div class="error">The secure job-search dashboard could not be unlocked. Run the job-search sync once, then confirm that the embed key matches JOBS_DASHBOARD_KEY.</div>`; });
</script>
</body>
</html>
