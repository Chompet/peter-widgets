<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tube Status</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#ffffff;
    color:#2f3437;
}

.card{
    max-width:420px;
    margin:auto;
    border-radius:14px;
    border:1px solid #e6e6e6;
    padding:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
}

h2{
    margin-top:0;
    margin-bottom:16px;
    font-size:20px;
}

.line{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #eee;
}

.line:last-child{
    border-bottom:none;
}

.good{
    color:#14833b;
    font-weight:600;
}

.minor{
    color:#d97706;
    font-weight:600;
}

.bad{
    color:#dc2626;
    font-weight:600;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">

<h2>🚇 Tube Status</h2>

<div id="status">
Loading...
</div>

<div class="footer" id="updated">
</div>

</div>

<script>

const favouriteLines = [
"northern",
"victoria",
"piccadilly",
"jubilee",
"central"
];

async function loadStatus(){

try{

const response = await fetch("https://api.tfl.gov.uk/line/mode/tube/status");

const data = await response.json();

const container = document.getElementById("status");

container.innerHTML="";

data
.filter(line=>favouriteLines.includes(line.id))
.forEach(line=>{

const status=line.lineStatuses[0].statusSeverityDescription;

let css="good";

if(status.includes("Minor"))
css="minor";

if(
status.includes("Severe") ||
status.includes("Part") ||
status.includes("Suspended") ||
status.includes("Closed")
)
css="bad";

container.innerHTML+=`
<div class="line">
<div>${line.name}</div>
<div class="${css}">${status}</div>
</div>
`;

});

document.getElementById("updated").innerHTML=
"Updated "+
new Date().toLocaleTimeString("en-GB",{
hour:"2-digit",
minute:"2-digit"
});

}

catch{

document.getElementById("status").innerHTML=
"Couldn't contact TfL.";

}

}

loadStatus();

setInterval(loadStatus,60000);

</script>

</body>
</html>
