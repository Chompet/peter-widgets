<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Curator</title>

<style>
body{
  margin:0;
  padding:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#ffffff;
  color:#2f3437;
}
.card{
  border:1px solid #e6e6e6;
  border-radius:14px;
  padding:14px;
  max-width:560px;
  margin:auto;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.title{
  font-size:18px;
  font-weight:700;
}
button{
  border:1px solid #ddd;
  background:#f7f7f7;
  border-radius:999px;
  padding:5px 10px;
  cursor:pointer;
  font-size:12px;
}
.movie-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:6px;
}
.meta{
  font-size:12px;
  color:#777;
  margin-bottom:10px;
}
.why{
  font-size:13px;
  line-height:1.45;
  margin-top:8px;
}
.row{
  padding:8px 0;
  border-bottom:1px solid #eee;
}
.row:last-child{
  border-bottom:none;
}
.label{
  font-weight:700;
}
.note{
  margin-top:10px;
  font-size:11px;
  color:#888;
}
.error{
  color:#dc2626;
  font-weight:600;
}
</style>
</head>

<body>
<div class="card">
  <div class="header">
    <div class="title">🎲 Project Curator</div>
    <button onclick="shuffleMovie()">Surprise me</button>
  </div>

  <div id="movie">Loading movies...</div>

  <div class="note">Powered by Peter's Curated Cinema database.</div>
</div>

<script>
let movies = [];

function pick(list){
  return list[Math.floor(Math.random() * list.length)];
}

function valueOrUnknown(value){
  return value === undefined || value === null || value === "" ? "Unknown" : value;
}

function shuffleMovie(){
  if(!movies.length){
    document.getElementById("movie").innerHTML =
      '<div class="error">No movies found.</div>';
    return;
  }

  const movie = pick(movies);

  const title = valueOrUnknown(movie.title);
  const year = valueOrUnknown(movie.year);
  const director = valueOrUnknown(movie.director);
  const runtime = valueOrUnknown(movie.runtime);
  const complexity = valueOrUnknown(movie.complexity);
  const dub = valueOrUnknown(movie.hungarianDub);
  const why = valueOrUnknown(movie.whyRecommended);

  document.getElementById("movie").innerHTML = `
    <div class="row">
      <div class="movie-title">🎬 ${title}</div>
      <div class="meta">${year} • ${director} • ${runtime} min</div>
    </div>

    <div class="row">
      <span class="label">🧠 Complexity:</span> ${complexity}/10
    </div>

    <div class="row">
      <span class="label">🇭🇺 Hungarian dub:</span> ${dub}
    </div>

    <div class="why">
      <span class="label">Why?</span> ${why}
    </div>
  `;
}

async function loadMovies(){
  try{
    const response = await fetch("../data/movies.json");
    const data = await response.json();

    movies = Array.isArray(data) ? data : data.movies;

    shuffleMovie();
  }catch(error){
    document.getElementById("movie").innerHTML =
      '<div class="error">Could not load movies.json.</div>';
  }
}

loadMovies();
</script>
</body>
</html>
